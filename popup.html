<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LinkedIn Automation</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="wrap">
      <h1>LinkedIn Automation</h1>
      <p class="sub">Fast extension mode with credit limits</p>

      <label for="apiBase">API Base URL</label>
      <input id="apiBase" type="text" placeholder="https://your-api.onrender.com/api" />

      <label for="loginEmail">Dashboard Email</label>
      <input id="loginEmail" type="email" placeholder="you@example.com" />

      <label for="loginPassword">Dashboard Password</label>
      <input id="loginPassword" type="password" placeholder="Enter dashboard password" />

      <label for="deviceId">Device ID</label>
      <input id="deviceId" type="text" readonly />

      <div class="row">
        <button id="saveBtn" class="primary">Save</button>
        <button id="loginStartBtn">Login & Start</button>
      </div>

      <div id="usageBox" class="status info">Usage: not loaded</div>

      <label for="actionType">Extension Action</label>
      <select id="actionType">
        <option value="profile_search">Profile Search (limited)</option>
        <option value="quick_comment_draft">Quick AI Comment Draft</option>
        <option value="relevance_badge">Relevance Badge</option>
        <option value="save_lead_shortcut">Save Lead Shortcut</option>
        <option value="feed_monitor">Feed Monitor (webapp only)</option>
      </select>

      <div class="row">
        <button id="refreshBtn">Refresh Usage</button>
        <button id="checkCreditsBtn">Check Action</button>
      </div>

      <div class="row">
        <button id="consumeBtn">Run Action</button>
      </div>

      <div class="status warning" id="feedMonitorNotice">
        Feed Monitor is webapp-only for now. Future paid unlock will enable it in extension with no limits.
      </div>

      <div id="statusBox" class="status">Ready</div>

      <div class="row links">
        <a id="dashboardLink" href="#" target="_blank" rel="noreferrer">Dashboard</a>
        <a id="pricingLink" href="#" target="_blank" rel="noreferrer">Pricing</a>
      </div>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
